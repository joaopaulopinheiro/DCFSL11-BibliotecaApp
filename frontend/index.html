<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibliotecaApp</title>
    <link rel="shortcut icon" href="/library_86218.png" type="image/x-icon">
    <!-- Theme initializer: prevents dark/light flash on load -->
    <script>
      (function(){
        var t = localStorage.getItem('bib-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
